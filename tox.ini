[tox]
requires =
    tox>=4
    tox-uv>=1
env_list = lint, tests

# tox-uv automatically enables uv-based environment creation and dependency
# resolution when installed alongside tox. No explicit runner setting needed.

[testenv:lint]
description = ruff check + format check
skip_install = true
deps =
    ruff>=0.15
commands =
    ruff check src/ tests/
    ruff format --check src/ tests/

[testenv:tests]
description = run the pytest test suite
deps =
    pytest>=8.0
commands =
    pytest tests/ {posargs:-x -v}

[testenv:fetch-checkpoints]
description = fetch + convert the pet-mad-xs reference checkpoint for tests
extras = convert
deps =
    metatrain
commands =
    petjax-convert pet-mad-xs --out tests/assets/checkpoints/pet-mad-xs
